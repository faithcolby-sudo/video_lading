<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Landing</title>

<style>

body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    position:relative;
    max-width:450px;
    width:100%;
}

#thumb{
    width:100%;
    display:block;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:90px;
    color:white;
    cursor:pointer;
    user-select:none;
}

</style>
</head>

<body>

<div class="container">

    <img id="thumb">

    <div class="play" onclick="goVideo()">
        ▶
    </div>

</div>

<script>

let videoUrl = "";

fetch("videos.json")
.then(response => response.json())
.then(data => {

    const video = data["abc123"];

    document.getElementById("thumb").src =
    video.thumbnail;

    videoUrl = video.redirect;

});

function goVideo(){
    window.location.href = videoUrl;
}

</script>

</body>
</html>
