<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Landing</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
}

.player{
    width:420px;
    background:#181818;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 0 35px rgba(0,0,0,.7);
    border:1px solid rgba(255,255,255,.08);
}

.header{
    background:#202020;
    color:white;
    padding:14px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
    letter-spacing:1px;
}

.video-box{
    position:relative;
    width:100%;
    height:720px;
    overflow:hidden;
    background:black;
}

.top-bar{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:#2c2c2c;
    z-index:2;
}

.progress{
    width:35%;
    height:100%;
    background:#ff0000;
}

#thumb{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(0,0,0,.55);
    border:3px solid rgba(255,255,255,.9);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:white;
    font-size:42px;
    backdrop-filter:blur(4px);
}

.play:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

.video-label{
    position:absolute;
    bottom:15px;
    left:15px;
    background:rgba(0,0,0,.65);
    color:white;
    padding:6px 10px;
    border-radius:6px;
    font-size:13px;
}

.footer{
    padding:14px;
    color:#bfbfbf;
    font-size:14px;
    text-align:center;
    background:#1b1b1b;
}

.footer strong{
    color:white;
}

</style>
</head>

<body>

<div class="player">

    <div class="header">
        IMOVI
    </div>

    <div class="video-box">

        <div class="top-bar">
            <div class="progress"></div>
        </div>

        <img id="thumb" src="">

        <div class="play" onclick="goVideo()">
            ▶
        </div>

        <div class="video-label">
            ▶ Video disponible
        </div>

    </div>

    <div class="footer">
        <strong>Presiona Play para continuar</strong>
    </div>

</div>

<script>

let videoUrl = "";

fetch("videos.json")
.then(response => response.json())
.then(data => {

    const params = new URLSearchParams(window.location.search);

    const id = params.get("v") || "abc123";

    if(!data[id]){
        document.body.innerHTML =
        "<h1 style='color:white'>Video no encontrado</h1>";
        return;
    }

    document.getElementById("thumb").src =
    data[id].thumbnail;

    videoUrl =
    data[id].redirect;

});

function goVideo(){
    if(videoUrl){
        window.location.href = videoUrl;
    }
}

</script>

</body>
</html>
