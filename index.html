<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Landing</title>

<style>

body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
}

.container{
    position:relative;
    max-width:450px;
    width:95%;
}

#thumb{
    width:100%;
    display:block;
    border-radius:12px;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:90px;
    color:white;
    cursor:pointer;
    user-select:none;
    text-shadow:0 0 15px rgba(0,0,0,0.8);
}

</style>
</head>

<body>

<div class="container">

    <img id="thumb" src="">

    <div class="play" onclick="goVideo()">
        ▶
    </div>

</div>

<script>

let videoUrl = "";

fetch("videos.json")
.then(response => response.json())
.then(data => {

    const params = new URLSearchParams(window.location.search);

    const id = params.get("v") || "abc123";

    if(!data[id]){
        document.body.innerHTML = "<h1 style='color:white'>Video no encontrado</h1>";
        return;
    }

    const video = data[id];

    document.getElementById("thumb").src = video.thumbnail;

    videoUrl = video.redirect;

});

function goVideo(){
    if(videoUrl){
        window.location.href = videoUrl;
    }
}

</script>

</body>
</html>
