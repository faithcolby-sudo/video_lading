<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Landing</title>

<style>

body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
}

.player{
    width:95%;
    max-width:500px;
    background:#1c1c1c;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(0,0,0,.5);
}

.header{
    background:#222;
    color:white;
    padding:12px;
    text-align:center;
    font-weight:bold;
}

.video-box{
    position:relative;
}

#thumb{
    width:100%;
    display:block;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:90px;
    color:white;
    cursor:pointer;
    text-shadow:0 0 20px rgba(0,0,0,.8);
}

.footer{
    padding:10px;
    color:#aaa;
    font-size:14px;
    text-align:center;
}

</style>
</head>

<body>

<div class="player">

    <div class="header">
        Video Landing
    </div>

    <div class="video-box">

        <img id="thumb" src="">

        <div class="play" onclick="goVideo()">
            ▶
        </div>

    </div>

    <div class="footer">
        Click en Play para continuar
    </div>

</div>

<script>

let videoUrl = "";

fetch("videos.json")
.then(response => response.json())
.then(data => {

    const params = new URLSearchParams(window.location.search);

    const id = params.get("v") || "abc123";

    if(!data[id]){
        document.body.innerHTML =
        "<h1 style='color:white'>Video no encontrado</h1>";
        return;
    }

    document.getElementById("thumb").src =
    data[id].thumbnail;

    videoUrl =
    data[id].redirect;

});

function goVideo(){
    if(videoUrl){
        window.location.href = videoUrl;
    }
}

</script>

</body>
</html>
